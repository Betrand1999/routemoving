name: Deploy RouteMoving to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT_ID: main-nucleus-418523
      GCP_REGION: us-central1
      SERVICE_NAME: routemoving
      REPOSITORY: routemoving
      IMAGE_NAME: routemoving
      IMAGE_TAG: latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker $GCP_REGION-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$REPOSITORY/$IMAGE_NAME:$IMAGE_TAG .

      - name: Push image to Artifact Registry
        run: |
          docker push \
            $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$REPOSITORY/$IMAGE_NAME:$IMAGE_TAG

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$REPOSITORY/$IMAGE_NAME:$IMAGE_TAG \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars AWS_REGION="${{ secrets.AWS_REGION }}" \
            --set-env-vars AWS_DEFAULT_REGION="${{ secrets.AWS_REGION }}" \
            --set-env-vars AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --set-env-vars AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --set-env-vars SENDER_EMAIL="${{ secrets.SENDER_EMAIL }}" \
            --set-env-vars RECEIVER_EMAIL="${{ secrets.RECEIVER_EMAIL }}" \
            --set-env-vars MONGO_URI="${{ secrets.MONGO_URI }}" \
            --set-env-vars MONGO_DB="${{ secrets.MONGO_DB }}" \
            --set-env-vars MONGO_COLLECTION="${{ secrets.MONGO_COLLECTION }}"
