<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>RouteMoving | Your Route to Stress-Free Moving</title>

  <!-- SEO -->
  <meta
    name="description"
    content="RouteMoving provides professional residential and commercial moving services with reliable, stress-free relocation and logistics solutions."
  />

  <meta
    name="keywords"
    content="moving company, residential moving, commercial moving, packing services, relocation, logistics, RouteMoving"
  />

  <meta name="robots" content="index, follow" />

  <!-- Open Graph (for Google/Facebook/LinkedIn) -->
  <meta
    property="og:title"
    content="RouteMoving | Your Route to Stress-Free Moving"
  />

  <meta
    property="og:description"
    content="Professional moving, relocation, and logistics services built around reliability, care, and speed."
  />

  <meta property="og:url" content="https://routemoving.com" />

  <meta property="og:type" content="website" />

  <meta
    property="og:image"
    content="https://routemoving.com/static/images/logo.png"
  />

  <!-- Favicon -->
  <link
    rel="icon"
    type="image/svg+xml"
    href="{{ url_for('static', filename='images/logo.svg') }}"
  />

  <link
    rel="icon"
    type="image/png"
    href="{{ url_for('static', filename='images/logo.png') }}"
  />

  <!-- Styles -->
  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/global.css') }}"
  />

  <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/home.css') }}"
  />
</head>
